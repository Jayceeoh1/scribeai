# Asigură yt-dlp, ffmpeg și python3 disponibile pentru download video (Tool: Download)
[phases.setup]
nixPkgs = ["...", "yt-dlp", "ffmpeg", "python3", "python3Packages.pip"]

# Fază dedicată, după setup, înainte de install — confirmă explicit
# (vizibil în build logs) dacă yt-dlp e pe PATH; altfel îl instalează prin pip.
[phases.ytdlpcheck]
dependsOn = ["setup"]
cmds = [
  "echo '=== Verificare yt-dlp ===' && (which yt-dlp && yt-dlp --version) || (echo 'yt-dlp lipsește din Nix, instalez prin pip...' && pip install --break-system-packages --no-cache-dir yt-dlp && which yt-dlp && yt-dlp --version)"
]

[phases.install]
dependsOn = ["...", "ytdlpcheck"]